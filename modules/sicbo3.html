<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>骰寶體驗 — 機率教學</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-depth="module">
  <div class="container">
    <h1 class="page-title">真實骰子遊戲體驗</h1>
    <p class="page-desc">完整骰寶賭桌，支援所有注區同時下注，一次擲骰結算。</p>

    <div class="bankroll-bar">
      <div class="form-group">
        <label for="bankroll-input">設定本金</label>
        <input type="number" id="bankroll-input" min="100" value="1000">
      </div>
      <button class="btn btn-primary" id="btn-start">開始遊戲</button>
      <button class="btn btn-secondary" id="btn-reset">重新開始</button>
      <div>目前本金：<span class="bankroll-amount" id="bankroll">—</span></div>
    </div>

    <div class="chip-input-row">
      <span style="font-size:0.85rem;color:var(--text-muted)">籌碼面額：</span>
      <button class="chip-btn selected" data-chip="10">10</button>
      <button class="chip-btn" data-chip="50">50</button>
      <button class="chip-btn" data-chip="100">100</button>
      <button class="chip-btn" data-chip="500">500</button>
      <input type="number" id="chip-value" min="1" value="10" style="width:80px">
    </div>

    <div class="sicbo-table">
      <div class="dice-display">
        <div class="die" id="die1">?</div>
        <div class="die" id="die2">?</div>
        <div class="die" id="die3">?</div>
      </div>
      <div id="bet-table"></div>
    </div>

    <div class="control-row" style="margin-bottom:1rem">
      <button class="btn btn-primary" id="btn-roll" disabled>擲骰</button>
      <button class="btn btn-secondary" id="btn-clear" disabled>清除下注</button>
    </div>
    <div class="result-msg" id="result-msg">請設定本金後開始遊戲</div>
  </div>
  <script src="../js/main.js"></script>
  <script src="../js/sicbo-engine.js"></script>
  <script src="../js/modules/sicbo-game.js"></script>
</body>
</html>
